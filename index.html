<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Bolão Copa Libertadores da América 2026"
    >

    <title id="titulo-aplicacao">
        
    </title>


    <!-- CSS PRINCIPAL -->

    <link        rel="stylesheet"        href="css/style.css">

</head>


<body class="app-inicializando">


    <!-- ============================================================
         APLICAÇÃO
         ============================================================ -->


    <div id="app">


        <!-- ========================================================
             TELA DE LOGIN
             ======================================================== -->


<section    id="tela-login"    class="tela">

    <div class="login-container">

        <h1>
            Bolão Libertadores 2026
        </h1>


        <p>
            Faça login para registrar seus palpites.
        </p>


        <div
            class="campo-formulario"
        >

            <label
                for="login-participante"
            >
                Participante
            </label>


            <input
                id="login-participante"
                type="text"
            >

        </div>


        <div
            class="campo-formulario"
        >

            <label
                for="login-senha"
            >
                Senha
            </label>


            <input
                id="login-senha"
                type="password"
            >

        </div>


        <button
            id="btn-login"
            type="button"
        >

            Entrar

        </button>


        <div
            id="login-mensagem"
            class="mensagem"
        >

        </div>

    </div>

</section>


        <!-- ========================================================
             TELA PRINCIPAL
             ======================================================== -->


       <section
    id="tela-principal"
    class="tela"
    hidden
>

    <header
        id="cabecalho-principal"
    >

        <div>

            <h1 id="titulo-pagina">
                
            </h1>


            <p
                id="usuario-logado"
            >

            </p>

        </div>


        <button
            id="btn-logout"
            type="button"
        >

            Sair

        </button>

    </header>


    <main>

        <nav
            id="navegacao-principal"
        >

            <button
                class="nav-btn ativo"
                type="button"
                data-tela="jogos"
            >

                Jogos

            </button>


            <button
                class="nav-btn"
                type="button"
                data-tela="ranking"
            >

                Ranking

            </button>

        </nav>


        <section
            id="secao-jogos"
        >

            <div class="cabecalho-secao">

    <div class="cabecalho-secao-titulo">

        <div>

            <h2>
                Palpites dos Jogos
            </h2>

            <p>
                Registre seus palpites para os jogos da Libertadores 2026.
            </p>

        </div>


        <button
            id="btn-salvar-todos"
            type="button"
        >

            Salvar Todos

        </button>

    </div>

</div>


            <div
                id="lista-jogos"
            >

            </div>

        </section>


        <section
            id="secao-ranking"
            hidden
        >

            <div
                class="cabecalho-secao"
            >

                <h2>
                    Ranking
                </h2>

            </div>


            <div
                id="ranking-container"
            >

                Em breve.

            </div>

        </section>

    </main>

</section>

    </div>


    <!-- ============================================================
         JAVASCRIPT
         ============================================================ -->

<script src="js/api.js"></script>

<script src="js/app.js"></script>


</body>

</html>
